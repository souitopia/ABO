<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연인 페이지</title>
    <link rel="stylesheet" href="css.css" />
  </head>
  <body>
    <div class="page-container">
      <main class="main-content">
        <section class="game-section">
          <h2 class="pixel-title"><span class="icon">⚖️</span> 밸런스게임</h2>
          <div class="card-container">
            <a
              href="https://maison-de-carrot.tistory.com/173"
              target="_blank"
              class="pink-card"
            >
              <span>소개팅 버전</span>
            </a>
            <a
              href="https://www.instagram.com/p/DOdBBcMAUbu/?img_index=3"
              class="pink-card"
              ><span>부부 버전</span></a
            >
            <a
              href="https://blog.naver.com/youjin133/223767188132"
              class="pink-card"
              ><span>커플 버전</span></a
            >
            <div class="more-arrow">➔</div>
          </div>
        </section>

        <section class="game-section">
          <h2 class="pixel-title"><span class="icon">💡</span> 심리테스트</h2>
          <div class="card-container">
            <a href="https://testmoa.com/love-eros/" class="pink-card"
              ><span>성격 심리테스트</span></a
            >
            <a href="https://testmoa.com/love-synergy/" class="pink-card"
              ><span>연애 심리테스트</span></a
            >
            <a href="https://testmoa.com/love-triangle/" class="pink-card"
              ><span>심리 상태 점검</span></a
            >
            <div class="more-arrow">➔</div>
          </div>
        </section>
        <section class="game-section">
          <h2 class="pixel-title"><span class="icon">🎮</span> 추천게임</h2>
          <div class="card-container">
            <a
              href="https://apps.apple.com/kr/app/%EC%8D%B8%EC%9B%90-sumone/id1469506430"
              class="pink-card"
              ><span>ios 사용자</span></a
            >
            <a
              href="https://play.google.com/store/apps/details?id=com.sumone&hl=ko"
              class="pink-card"
              ><span>안드로이드 사용자</span></a
            >
            <a
              href="https://kr.ldplayer.net/apps/com-sumone-on-pc.html#google_vignette"
              class="pink-card"
              ><span>pc 사용자</span></a
            >
            <div class="more-arrow">➔</div>
          </div>
        </section>
      </main>

      <aside class="right-sidebar">
        <nav class="sidebar-nav">
          <a href="#" class="sidebar-link">MY</a>
          <a href="#" class="sidebar-link">Library</a>
          <a href="#" class="sidebar-link">Notice</a>
          <a href="#" class="sidebar-link">Inquiry</a>
        </nav>
      </aside>
