<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>발표 준비</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: #f5f5f5;
        font-family: "Malgun Gothic", sans-serif;
      }

      .navbar {
        width: 100%;
        background-color: #ffffff;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        padding: 15px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
      }

      .nav-menu {
        display: flex;
        align-items: center;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .nav-item {
        display: flex;
        align-items: center;
      }

      .nav-item a {
        text-decoration: none;
        color: #333333;
        font-size: 18px;
        font-weight: bold;
        padding: 0 20px;
        transition: color 0.2s;
      }

      .nav-item a:hover {
        color: #007bff;
      }

      .nav-item:not(:last-child)::after {
        content: "|";
        color: #ccc;
        font-size: 16px;
      }

      .main-content {
        flex: 1;
        margin-top: 56px;
        margin-bottom: 120px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 0;
        box-sizing: border-box;
      }

      .intro-section {
        text-align: center;
        margin-bottom: 50px;
      }

      .intro-title {
        font-size: 50px;
        font-weight: bold;
        color: #222222;
        margin: 0 0 15px 0;
      }

      .intro-subtitle {
        font-size: 20px;
        color: #666666;
        margin: 0;
      }

      .folder-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 60px;
        width: 100%;
        max-width: 1600px;
        padding: 0 40px;
        box-sizing: border-box;
      }

      .folder-item {
        display: block;
        transition: transform 0.3s ease;
      }

      .folder-item:hover {
        transform: scale(1.08);
      }

      .folder-item img {
        width: 450px;
        height: 450px;
        object-fit: contain;
        display: block;
      }

      .footer {
        width: 100%;
        height: 120px;
        background-color: #ffffff;
        box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.05);
        padding: 0 30px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        box-sizing: border-box;
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 1000;
      }

      .easter-egg-img {
        height: 100%;
        width: auto;
        display: block;
        margin-right: 25px;
      }

      .footer-info {
        font-size: 28px;
        color: #333333;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header class="navbar">
      <ul class="nav-menu">
        <li class="nav-item"><a href="page1.html">가족</a></li>
        <li class="nav-item"><a href="page2.html">연인</a></li>
        <li class="nav-item"><a href="발표준비.html">홈</a></li>
        <li class="nav-item"><a href="page3.html">친구</a></li>
      </ul>
    </header>

    <main class="main-content">
      <div class="intro-section">
        <h1 class="intro-title">아이스브레이킹</h1>
        <p class="intro-subtitle">
          가족과 연인과 친구와 함께 언제 어디서든 우리 웹페이지와 함께 하세요
        </p>
      </div>

      <div class="folder-container">
        <a href="page1.html" class="folder-item">
          <img src="가족.png" alt="가족" />
        </a>
        <a href="page2.html" class="folder-item">
          <img src="연인.png" alt="연인" />
        </a>
        <a href="page3.html" class="folder-item">
          <img src="친구.png" alt="친구" />
        </a>
      </div>
    </main>

    <footer class="footer">
      <img
        src="이스터에그.png"
        alt="이스터에그"
        class="easter-egg-img"
        usemap="#easteregg-map"
      />

      <map name="easteregg-map">
        <area
          shape="circle"
          coords="110,340,110"
          href="page2.html"
          alt="연인"
        />
        <area
          shape="circle"
          coords="370,260,110"
          href="page1.html"
          alt="가족"
        />
        <area shape="circle" coords="150,110,90" href="page3.html" alt="친구" />
      </map>

      <div class="footer-info">| 만든이 | 박예지 | 정소현 | 허은비 |</div>
    </footer>
  </body>
</html>
